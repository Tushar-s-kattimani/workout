<svg xmlns="http://www.svg.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121212" />
      <stop offset="100%" stop-color="#242424" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E676" />
      <stop offset="100%" stop-color="#00C853" />
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <g transform="translate(256, 256) rotate(-45) translate(-256, -256)">
    <!-- Dumbbell Bar -->
    <rect x="186" y="240" width="140" height="32" rx="10" fill="#BDBDBD" />
    
    <!-- Left Weights -->
    <rect x="150" y="196" width="32" height="120" rx="10" fill="url(#accentGrad)" />
    <rect x="110" y="216" width="28" height="80" rx="8" fill="url(#accentGrad)" />
    
    <!-- Right Weights -->
    <rect x="330" y="196" width="32" height="120" rx="10" fill="url(#accentGrad)" />
    <rect x="374" y="216" width="28" height="80" rx="8" fill="url(#accentGrad)" />
  </g>
</svg>
